name: Feature request
description: An idea to make the phone agent better
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem or missed opportunity?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
