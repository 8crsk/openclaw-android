version: 2
updates:
  # Gradle / Android dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch the noisy, tightly-coupled families into one PR each.
      androidx:
        patterns: ["androidx.*"]
      compose:
        patterns: ["androidx.compose.*"]
      kotlin-coroutines:
        patterns: ["org.jetbrains.kotlinx:*"]

  # GitHub Actions used by our workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci(deps)"
